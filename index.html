<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta property="og:type" content="website">
<meta property="og:title" content="[재명♥은지] Wedding Notice">
<meta property="og:description" content="저희 결혼합니다. 따뜻한 마음으로 축하해주세요.">
<meta property="og:image" content="https://jm890912.github.io/wedding/threeeeshot.jpg">
<meta property="og:url" content="https://jm890912.github.io/wedding/">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Noto Serif KR', serif; background: #f8f5f2; color: #333; overflow-x: hidden; }

/* 입장 문 */
.door-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: flex; perspective: 1200px; }
.door { width: 50%; height: 100%; background: #e8dfd8; transition: transform 1.2s ease; }
.left { transform-origin: left; }
.right { transform-origin: right; }
.door.open.left { transform: rotateY(-100deg); }
.door.open.right { transform: rotateY(100deg); }
.door-text { position: fixed; width: 100%; top: 50%; text-align: center; transform: translateY(-50%); z-index: 10000; font-size: 18px; color: #555; cursor: pointer; }

.container { max-width: 420px; margin: auto; background: white; padding: 30px 20px 200px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; opacity: 0; transition: opacity 1s ease; }
.container.show { opacity: 1; }

.hero { overflow: hidden; width: 100%; border-radius: 12px; background: #f8f5f2; display: flex; justify-content: center; align-items: center; }
.hero video { width: 100%; height: auto; display: block; border-radius: 12px; object-fit: contain; }

.title { margin-top: 30px; font-size: 26px; }
.subtitle { margin-top: 10px; font-size: 15px; color: #777; }
.divider { margin: 30px auto; width: 40px; height: 1px; background: #ddd; }
.info { line-height: 1.8; font-size: 15px; }

/* D-Day */
.dday-wrap { margin: 20px auto 10px; display: inline-block; text-align: center; }
.dday-label { font-size: 15px; color: #aaa; letter-spacing: 2px; margin-bottom: 6px; }
.dday-badge { font-size: 32px; font-weight: 500; color: #c8a97e; letter-spacing: 1px; }
.dday-sub { font-size: 18px; color: #555; margin-top: 4px; }

/* 무한 갤러리 슬라이더 스타일 */
.gallery-slider { margin-top: 40px; overflow: hidden; }
.gallery-track { display: flex; gap: 8px; will-change: transform; }
.gallery-track img {
  width: calc(50% - 4px);
  flex-shrink: 0;
  border-radius: 6px;
  cursor: pointer;
  object-fit: cover;
  aspect-ratio: 1;
  user-select: none;
  -webkit-user-select: none;
  -webkit-user-drag: none;
}

/* 모달 스타일 */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 99999;
  flex-direction: column;
  gap: 16px;
}
.modal-img-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}
.modal img {
  width: 90%;
  max-width: 500px;
  border-radius: 8px;
  user-select: none;
  -webkit-user-select: none;
  -webkit-user-drag: none;
  transition: opacity 0.3s ease;
}
.modal-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 50%;
  width: 44px; height: 44px;
  font-size: 26px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  transition: background 0.2s;
  line-height: 1;
}
.modal-btn:hover { background: rgba(255,255,255,0.35); }
.modal-btn:disabled { opacity: 0.2; cursor: default; }
.modal-btn.prev { left: 16px; }
.modal-btn.next { right: 16px; }
.modal-close {
  position: absolute;
  top: 16px; right: 20px;
  background: none;
  border: none;
  color: #fff;
  font-size: 32px;
  cursor: pointer;
  line-height: 1;
  opacity: 0.7;
}
.modal-dots { display: flex; justify-content: center; gap: 8px; }
.modal-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
  cursor: pointer;
  transition: background 0.3s;
}
.modal-dot.active { background: #fff; }
.modal-counter {
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  font-family: 'Noto Serif KR', serif;
}

.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(50, 50, 50, 0.9); color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 15px; z-index: 10001; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="door-wrap" id="doorWrap">
  <div class="door left" id="leftDoor" onclick="openDoor()"></div>
  <div class="door right" id="rightDoor" onclick="openDoor()"></div>
</div>
<div class="door-text" onclick="openDoor()">저희의 시작을 응원해 주세요</div>

<div class="container" id="main">
  <div class="hero" data-aos="fade-up">
    <video id="mainVideo" src="wmremove-transformed_1.mp4" playsinline style="opacity:0;"></video>
  </div>

  <div class="title" data-aos="fade-up">안은지 ♥ 한재명</div>

  <div id="infowrap" class="info-wrap" data-aos="fade-up">
    <div class="subtitle">우리 결혼해요</div>
    <div class="divider"></div>
    <div class="info">
    안녕하세요.<br>
    저희 두 사람, 3년의 시간을 함께하며<br>
    서로에게 가장 소중한 사람임을 깨닫고,<br>
    이제 부부의 연을 맺습니다.<br><br>

    결혼식은 따로 진행하지 않고<br>
    가족들과 조용히 첫걸음을 내딛기로 했습니다.<br>
    직접 찾아뵈어 소식전해야함이 마땅하나<br>
    신랑이 준비한 모바일 소식으로 대신하니,<br>
    넓은 마음으로 이해해주시길 바랍니다.<br><br>

    직접 모시지 못해 송구한 마음 전하며,<br>
    멀리서나마 응원해주시면 행복하게 살겠습니다.<br><br>
    재명♥은지 드림
    </div>
  </div>

  <div class="dday-wrap" id="ddayWrap" data-aos="fade-up">
    <div class="dday-label" id="weddingLabel">WEDDING DAY</div>
    <div class="dday-badge" id="ddayBadge"></div>
    <div class="dday-sub" id="weddingDate">2026년 5월 9일 토요일</div>
  </div>

  <div class="gallery-slider">
    <div class="gallery-track" id="galleryTrack"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="modal" id="modal">
  <button class="modal-close" onclick="closeModal()">&#215;</button>
  <div class="modal-img-wrap">
    <button class="modal-btn prev" id="modalPrev" onclick="modalSlide(-1)">&#8249;</button>
    <img id="modalImg">
    <button class="modal-btn next" id="modalNext" onclick="modalSlide(1)">&#8250;</button>
  </div>
  <div class="modal-dots" id="modalDots"></div>
  <div class="modal-counter" id="modalCounter"></div>
</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({ duration: 1000 });

const images = ["images/1_1.jpg", "images/1_2.jpg", "images/1_3.jpg", "images/1_5.jpg", "images/1_7.jpg", "images/1_6.jpg", "images/1_8.jpg", "images/1_9.jpg"];
let modalIndex = 0;
let autoSlideOffset = 0;
let autoSlideRAF = null;
const autoSlideSpeed = 0.6;

const toastEl = document.getElementById('toast');

function openDoor() {
  document.getElementById("leftDoor").classList.add("open");
  document.getElementById("rightDoor").classList.add("open");
  setTimeout(() => {
    document.getElementById("doorWrap").style.display = "none";
    document.querySelector(".door-text").style.display = "none";
    document.getElementById("main").classList.add("show");
    document.getElementById("mainVideo").play();
  }, 600);
}

function updateDday() {
  const wedding = new Date('2026-05-09T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0); wedding.setHours(0,0,0,0);
  const diff = Math.round((wedding - today) / (1000*60*60*24));
  const wrap = document.getElementById('ddayWrap');
  const badge = document.getElementById('ddayBadge');
  if (diff > 0) {
    badge.textContent = "D - " + diff; wrap.style.display = 'inline-block';
  } else if (diff === 0) {
    badge.textContent = "D - DAY"; wrap.style.display = 'inline-block';
  } else {
    document.getElementById('weddingLabel').textContent = "우리결혼했어요♥";
    document.getElementById('infowrap').style.display = 'none';
    badge.textContent = "D + " + (-diff); wrap.style.display = 'inline-block';
  }
}
updateDday();

function buildGallery() {
  const track = document.getElementById("galleryTrack");
  track.innerHTML = "";
  [...images, ...images, ...images].forEach((src) => {
    const img = document.createElement("img");
    img.src = src;
    img.onclick = () => openModal(src);
    track.appendChild(img);
  });
  startAutoSlide();
}

function startAutoSlide() {
  const track = document.getElementById("galleryTrack");
  function step() {
    const firstImg = track.children[0];
    if (!firstImg) return;
    const imgWidth = firstImg.offsetWidth + 8;
    const singleSetWidth = imgWidth * images.length;
    autoSlideOffset += autoSlideSpeed;
    if (autoSlideOffset >= singleSetWidth) autoSlideOffset -= singleSetWidth;
    track.style.transform = `translateX(-${autoSlideOffset}px)`;
    autoSlideRAF = requestAnimationFrame(step);
  }
  if (autoSlideRAF) cancelAnimationFrame(autoSlideRAF);
  autoSlideRAF = requestAnimationFrame(step);
}

function openModal(src) {
  const idx = images.indexOf(src);
  modalIndex = idx >= 0 ? idx : 0;
  renderModal();
  document.getElementById("modal").style.display = "flex";
  const dotsEl = document.getElementById("modalDots");
  dotsEl.innerHTML = "";
  images.forEach((_, i) => {
    const dot = document.createElement("div");
    dot.className = "modal-dot" + (i === modalIndex ? " active" : "");
    dot.onclick = (e) => { e.stopPropagation(); goToModal(i); };
    dotsEl.appendChild(dot);
  });
}

function renderModal() {
  const img = document.getElementById("modalImg");
  img.style.opacity = 0;
  img.src = images[modalIndex];
  img.onload = () => { img.style.opacity = 1; };
  document.getElementById("modalCounter").textContent = `${modalIndex + 1} / ${images.length}`;
  document.getElementById("modalPrev").disabled = modalIndex === 0;
  document.getElementById("modalNext").disabled = modalIndex === images.length - 1;
  document.querySelectorAll(".modal-dot").forEach((d, i) => {
    d.classList.toggle("active", i === modalIndex);
  });
}

function modalSlide(dir) {
  modalIndex = Math.max(0, Math.min(modalIndex + dir, images.length - 1));
  renderModal();
}

function goToModal(index) { modalIndex = index; renderModal(); }
function closeModal() { document.getElementById("modal").style.display = "none"; }

document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener("keydown", (e) => {
  if (document.getElementById("modal").style.display === "flex") {
    if (e.key === "ArrowLeft") modalSlide(-1);
    if (e.key === "ArrowRight") modalSlide(1);
    if (e.key === "Escape") closeModal();
  }
});

let touchStartX = 0;
document.getElementById("modal").addEventListener("touchstart", (e) => {
  touchStartX = e.touches[0].clientX;
});
document.getElementById("modal").addEventListener("touchend", (e) => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) modalSlide(diff > 0 ? 1 : -1);
});

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}

window.addEventListener("load", buildGallery);
const v = document.getElementById("mainVideo");
v.addEventListener("loadeddata", () => v.style.opacity = 1);
</script>
</body>
</html>
